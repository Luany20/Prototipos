<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/*
  Protótipo 3: E-mail de indenização (Outlook) -> clique no CTA da pesquisa
  Versão HTML autocontida — usa localStorage no lugar do window.storage
  do ambiente de artifacts do Claude, para funcionar offline em
  qualquer navegador, em qualquer computador, e ser hospedável no
  GitHub Pages.
*/

const STORAGE_KEY_PREFIX = "pesquisa-pos-uso";

const storage = {
  async get(key) {
    try {
      const raw = window.localStorage.getItem(key);
      if (raw === null) return null;
      return { key, value: raw };
    } catch (e) {
      return null;
    }
  },
  async set(key, value) {
    try {
      window.localStorage.setItem(key, value);
      return { key, value };
    } catch (e) {
      return null;
    }
  },
  async delete(key) {
    try {
      window.localStorage.removeItem(key);
      return { key, deleted: true };
    } catch (e) {
      return null;
    }
  },
};

function useSessionId() {
  const ref = useRef(null);
  if (!ref.current) {
    ref.current =
      "resp_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  }
  return ref.current;
}

const MOTIVOS = [
  { id: "A", label: "Rapidez da análise" },
  { id: "B", label: "Clareza das informações recebidas" },
  { id: "C", label: "Comunicação durante o processo" },
  { id: "D", label: "Valor da indenização" },
  { id: "E", label: "Outro" },
];

const MOTIVOS_RECUSADOS = [
  { id: "A", label: "Eu esperava que essa situação estivesse coberta" },
  { id: "B", label: "A comunicação não foi clara" },
  { id: "C", label: "Demora na análise" },
  { id: "D", label: "Dificuldade para acompanhar o processo" },
  { id: "E", label: "Outro" },
];

const ENTENDIMENTO_OPCOES = [
  { id: "A", label: "Sim" },
  { id: "B", label: "Parcialmente" },
  { id: "C", label: "Não" },
];

function NotaBotao({ n, ativa, onClick }) {
  const faixa = n <= 6 ? "baixa" : n <= 8 ? "media" : "alta";
  return (
    <button
      onClick={() => onClick(n)}
      aria-pressed={ativa}
      aria-label={`Nota ${n}`}
      className={`nota-btn nota-${faixa} ${ativa ? "nota-ativa" : ""}`}
    >
      <span className="nota-num">{n}</span>
    </button>
  );
}

function BarraProgresso({ etapa, total }) {
  const pct = Math.min(Math.max(etapa, 0), total) / total;
  return (
    <div className="barra-progresso-wrap" aria-hidden="true">
      <div className="barra-progresso-trilho">
        <div
          className="barra-progresso-preenchida"
          style={{ width: `${pct * 100}%` }}
        />
      </div>
    </div>
  );
}

function BannerLaranja({ children }) {
  return (
    <div className="banner-laranja">
      <h1 className="banner-titulo">{children}</h1>
    </div>
  );
}

function RodapeItau() {
  return (
    <footer className="rodape">
      <p className="rodape-assinatura">
        Atenciosamente,
        <br />
        <strong>Itaú Seguros S/A</strong>
      </p>
      <div className="rodape-icones">
        <span className="icone-social">f</span>
        <span className="icone-social">𝕏</span>
        <span className="icone-social">◎</span>
        <span className="icone-social">▶</span>
      </div>
      <p className="rodape-ajuda">
        Precisa de ajuda? Entre em contato com a gente pelo chat do app.
      </p>
    </footer>
  );
}

function PesquisaPorEmail() {
  const sessionId = useSessionId();
  const [fase, setFase] = useState("inbox");
  const [segmento, setSegmento] = useState("pago");
  const [etapa, setEtapa] = useState(1);
  const [nota, setNota] = useState(null);
  const [entendimento, setEntendimento] = useState(null);
  const [motivos, setMotivos] = useState([]);
  const [comentario, setComentario] = useState("");
  const [salvando, setSalvando] = useState(false);
  const [carregado, setCarregado] = useState(false);

  function abrirEmail(seg) {
    setSegmento(seg);
    setFase("email");
  }

  function voltarParaInbox() {
    setFase("inbox");
  }

  function voltarParaEmail() {
    setFase("email");
  }

  function abrirPesquisa() {
    setEtapa(1);
    setNota(null);
    setEntendimento(null);
    setMotivos([]);
    setComentario("");
    setFase("pesquisa");
  }

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get(
          `${STORAGE_KEY_PREFIX}:email:draft:${segmento}`
        );
        if (res && res.value) {
          const draft = JSON.parse(res.value);
          if (draft.nota != null) setNota(draft.nota);
          if (draft.entendimento) setEntendimento(draft.entendimento);
          if (draft.motivos) setMotivos(draft.motivos);
          if (draft.comentario) setComentario(draft.comentario);
        }
      } catch (e) {}
      setCarregado(true);
    })();
  }, []);

  async function salvarRascunho(next) {
    try {
      await storage.set(
        `${STORAGE_KEY_PREFIX}:email:draft:${segmento}`,
        JSON.stringify({ nota, entendimento, motivos, comentario, ...next })
      );
    } catch (e) {}
  }

  async function finalizarEnvio() {
    setSalvando(true);
    const registro = {
      id: sessionId,
      segmento:
        segmento === "pago"
          ? "CLIENTES PAGOS — CANAL E-MAIL"
          : "CLIENTES RECUSADOS — CANAL E-MAIL",
      nota,
      entendimento,
      motivos,
      comentario: comentario.trim(),
      enviadoEm: new Date().toISOString(),

    try {

        `${STORAGE_KEY_PREFIX}:respostas:email:${segmento}:${sessionId}`,

      // best-effort — não bloqueia a confirmação ao usuário
    } finally {
      setSalvando(false);
      setEtapa(4);
    }
  }

  if (!carregado) {
    return (
      <div className="tela-carregando">
        <div className="loading-dot" />
      </div>
    );
  }

  // ---------- FASE 0: Caixa de entrada ----------
  if (fase === "inbox") {
    return (

  if (fase === "email") {

          <span className="mail-ribbon-sep" />

          <span className="mail-destinatario-linha">

          </span>
        </div>

        </div>

        {ehRecusado ? (
          <div className="mail-corpo">
            <div className="banner-laranja-email">
              <p className="banner-titulo-email">

            <table className="mail-tabela-info">

                <tr>
                  <td>

                <tr>
                  <td>

                  </td>
                </tr>
              </tbody>
            </table>

            <p className="mail-paragrafo">

              seguradora. Sabemos que passar por uma situação de roubo ou
              furto é muito difícil, e por isso queremos explicar com todo
              respeito e clareza o motivo da recusa do pedido de
              indenização.
            </p>

            <p className="mail-paragrafo">
              Analisamos o seu pedido de acionamento da cobertura de{" "}
              <strong>Bolsa Protegida</strong>. No entanto, verificamos no
              Boletim de Ocorrência que os bens roubados/furtados não
              estavam com o cliente que contratou o seguro no momento do
              evento.
            </p>

            <p className="mail-rotulo">POR QUE ISSO É IMPORTANTE?</p>
            <p className="mail-paragrafo">
              Para ter direito ao reembolso, é necessário que os objetos
              estejam com o cliente no momento do roubo ou furto.
            </p>

            <p className="mail-rotulo">EXEMPLOS:</p>
            <p className="mail-paragrafo">
              <strong>Cobertura válida:</strong> item dentro da bolsa ou
              mochila que está nas mãos do cliente no momento do

              <strong>Cobertura não válida:</strong> se o cliente se afasta

              nesse período.

            <p className="mail-paragrafo" style={{ marginTop: 16 }}>
              Por isso, informamos que o processo foi encerrado sem
              pagamento, conforme as Condições Gerais do seguro contratado.
            </p>

            {/* ===== Novo bloco: CTA da pesquisa de satisfação ===== */}
            <div className="cta-pesquisa-card">
              <p className="cta-pesquisa-titulo">Compartilhe a sua percepção</p>
              <p className="cta-pesquisa-texto">
                Sabemos que essa não é a resposta que você esperava. Se
                quiser, conte pra gente o que podemos melhorar para os
                próximos clientes.
              </p>
              <button className="cta-pesquisa-botao" onClick={abrirPesquisa}>

            {/* ===== fim do novo bloco ===== */}

            <div className="mail-caixa-cinza">
              <p className="mail-paragrafo">

                <br />
                <span className="mail-link">
                  www.itau.com.br/seguros/consultaracionamento
                </span>
              </p>
              <p className="mail-paragrafo">
                Atenciosamente,
                <br />
                <strong>ITAÚ SEGUROS S/A</strong>
              </p>
            </div>

            <p className="mail-slogan">O Itaú tem tudo pra você.</p>

            <div className="mail-canais">

            <hr className="mail-linha" />

            <p className="mail-rodape-tel">
              Tem alguma dúvida? Entre em contato com a gente. Nossos
              telefones estão à sua disposição em{" "}

              </span>
            </p>
          </div>
        ) : (

                indenização será realizado.

            <table className="mail-tabela-info">
              <tbody>
                <tr>
                  <td>
                    <strong>Número do contrato:</strong> 02202401712000000013

                <tr>
                  <td>
                    <strong>Acionamento:</strong> 020171202400000701

                </tr>

            <p className="mail-saudacao">Olá,</p>
            <p className="mail-paragrafo">

              consequência do uso, idade, desgaste ou obsolescência.

              <p className="cta-pesquisa-titulo">
                Como foi sua experiência com a gente?

              <p className="mail-paragrafo">

            <p className="mail-slogan">O Itaú tem tudo pra você.</p>

            <div className="mail-canais">
              <p className="mail-canais-titulo">
                Dê preferência aos
                <br />
                nossos canais
                <br />
                digitais.
              </p>
              <div className="mail-canais-divisor" />
              <div className="mail-canais-lista">
                <span>☒ itau.com.br</span>
                <span>☒ app no celular</span>
              </div>
            </div>

            <hr className="mail-linha" />

            <p className="mail-rodape-tel">
              Tem alguma dúvida? Entre em contato com a gente. Nossos
              telefones estão à sua disposição em{" "}
              <span className="mail-link">
                www.itau.com.br/atendimento-itau/para-voce/telefones
              </span>
            </p>
          </div>
        )}
      </div>
    );
  }

  // ---------- FASE 2: Pesquisa (padrão carta Itaú) ----------
  const motivosAtivos = ehRecusado ? MOTIVOS_RECUSADOS : MOTIVOS;
  const TOTAL_ETAPAS = 3;

  return (
    <div className="app-raiz">
      <div className="carta">
        <button
          className="pesquisa-voltar-btn"
          onClick={voltarParaEmail}
          aria-label="Voltar ao e-mail"
        >
          ←
        </button>

        {etapa === 1 && (
          <>
            <BannerLaranja>
              {ehRecusado
                ? "Queremos entender sua experiência com a decisão do seu sinistro."
                : "Queremos saber sua opinião sobre a devolutiva do seu sinistro."}
            </BannerLaranja>
            <BarraProgresso etapa={etapa} total={TOTAL_ETAPAS} />
            <div className="corpo-carta">
              <p className="saudacao">Olá.</p>
              {ehRecusado ? (
                <p className="paragrafo">
                  Concluímos a análise do seu sinistro e, neste caso, a
                  cobertura não foi aprovada. Mesmo assim, gostaríamos de
                  ouvir você: sua opinião nos ajuda a entender o que podemos
                  melhorar na forma como conduzimos e comunicamos esse tipo
                  de decisão. São só 3 perguntas rápidas.
                </p>
              ) : (
                <p className="paragrafo">
                  Concluímos a análise do seu sinistro. Agora, gostaríamos de
                  ouvir você: sua opinião nos ajuda a entender o que fizemos
                  bem e o que podemos melhorar para os próximos clientes.
                  São só 3 perguntas rápidas.
                </p>
              )}

              {ehRecusado ? (
                <>
                  <p className="pergunta-titulo">
                    Você entendeu o motivo da decisão do seu sinistro?
                  </p>
                  <div className="opcoes-lista">
                    {ENTENDIMENTO_OPCOES.map((op) => (
                      <button
                        key={op.id}
                        className={`opcao-item ${
                          entendimento === op.id ? "opcao-ativa" : ""
                        }`}
                        onClick={() => {
                          setEntendimento(op.id);
                          salvarRascunho({ entendimento: op.id });
                          setTimeout(() => setEtapa(2), 220);
                        }}
                      >
                        <span className="opcao-letra">{op.id}</span>
                        <span>{op.label}</span>
                      </button>
                    ))}
                  </div>
                </>
              ) : (
                <>
                  <p className="pergunta-titulo">
                    De 0 a 10, como você avalia sua experiência no processo
                    do sinistro?
                  </p>
                  <div className="notas-grade">
                    {Array.from({ length: 11 }, (_, i) => i).map((n) => (
                      <NotaBotao
                        key={n}
                        n={n}
                        ativa={nota === n}
                        onClick={(v) => {
                          setNota(v);
                          salvarRascunho({ nota: v });
                          setTimeout(() => setEtapa(2), 220);
                        }}
                      />
                    ))}
                  </div>
                </>
              )}
              <RodapeItau />
            </div>
          </>
        )}

        {etapa === 2 && (
          <>
            <BannerLaranja>
              {ehRecusado
                ? "Queremos entender sua experiência com a decisão do seu sinistro."
                : "Queremos saber sua opinião sobre a devolutiva do seu sinistro."}
            </BannerLaranja>
            <BarraProgresso etapa={etapa} total={TOTAL_ETAPAS} />
            <div className="corpo-carta">
              <p className="pergunta-titulo">
                {ehRecusado
                  ? "O que mais impactou sua experiência?"
                  : "O que mais influenciou sua avaliação?"}
              </p>
              <p className="pergunta-opcional">Selecione uma ou mais opções</p>
              <div className="opcoes-lista">
                {motivosAtivos.map((m) => {
                  const selecionado = motivos.includes(m.id);
                  return (
                    <button
                      key={m.id}
                      className={`opcao-item ${selecionado ? "opcao-ativa" : ""}`}
                      onClick={() => {
                        const proximos = selecionado
                          ? motivos.filter((id) => id !== m.id)
                          : [...motivos, m.id];
                        setMotivos(proximos);
                        salvarRascunho({ motivos: proximos });
                      }}
                    >
                      <span className="opcao-check">
                        {selecionado ? "✓" : ""}
                      </span>
                      <span>{m.label}</span>
                    </button>
                  );
                })}
              </div>
              <div className="nav-duas-colunas">
                <button className="botao-secundario" onClick={() => setEtapa(1)}>
                  Voltar
                </button>
                <button
                  className="botao-primario"
                  disabled={motivos.length === 0}
                  onClick={() => setEtapa(3)}
                >
                  Continuar
                </button>
              </div>
              <RodapeItau />
            </div>
          </>
        )}

        {etapa === 3 && (
          <>
            <BannerLaranja>
              {ehRecusado
                ? "Queremos entender sua experiência com a decisão do seu sinistro."
                : "Queremos saber sua opinião sobre a devolutiva do seu sinistro."}
            </BannerLaranja>
            <BarraProgresso etapa={etapa} total={TOTAL_ETAPAS} />
            <div className="corpo-carta">
              <p className="pergunta-titulo">
                {ehRecusado
                  ? "Existe algo que poderíamos ter feito para tornar sua experiência melhor, mesmo com essa decisão?"
                  : "O que poderíamos fazer para melhorar sua experiência?"}
              </p>
              <p className="pergunta-opcional">Opcional</p>
              <textarea
                className="campo-texto"
                placeholder={
                  ehRecusado
                    ? "Deixe aqui sua percepção sobre como poderíamos ter feito uma experiência melhor."
                    : "Deixe aqui sua percepção sobre como podemos melhorar sua experiência"
                }
                value={comentario}
                onChange={(e) => {
                  setComentario(e.target.value);
                  salvarRascunho({ comentario: e.target.value });
                }}
                rows={5}
                maxLength={600}
              />
              <span className="contador">{comentario.length}/600</span>
              <div className="nav-duas-colunas">
                <button className="botao-secundario" onClick={() => setEtapa(2)}>
                  Voltar
                </button>
                <button
                  className="botao-primario botao-concluir"
                  disabled={salvando}
                  onClick={finalizarEnvio}
                >
                  {salvando ? "Enviando..." : "Concluir e enviar"}
                </button>
              </div>
              <RodapeItau />
            </div>
          </>
        )}

        {etapa === 4 && (
          <>
            <BannerLaranja>Obrigado pela sua resposta.</BannerLaranja>
            <div className="corpo-carta">
              <p className="saudacao">Olá.</p>

                <p className="paragrafo">
                  Sua resposta foi registrada com sucesso e vai nos ajudar a

                  diretamente melhorias no processo de sinistros. Conte com
                  o Itaú para futuros acionamentos.
                </p>
              )}
              <RodapeItau />
            </div>
          </>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PesquisaPorEmail />);
