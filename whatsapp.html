    color: #53BDEB;
    text-decoration: underline;
    cursor: pointer;
    word-break: break-all;
  }
  .wa-detalhes {
    background: #182229;
    border-radius: 8px;
    padding: 10px 12px;
    line-height: 1.7;
  }
  .wa-hora {
    display: block;
    text-align: right;
    font-size: 11px;
    color: #8696A0;
    margin-top: 6px;
  }

  /* ===== Tela Carta / Pesquisa (padrão Itaú) ===== */
  .tela-carregando {
    min-height: 100vh; width: 100%;
    display: flex; align-items: center; justify-content: center;
    background: #fff;
  }
  .loading-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #C1440E;
    animation: pulso 1s ease-in-out infinite;
  }
  @keyframes pulso {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .app-raiz {
    min-height: 100vh;
    width: 100%;
    background: #E9E9E9;
    display: flex;
    justify-content: center;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    color: #2B2B2B;
  }

  .carta {
    width: 100%;
    max-width: 520px;
    background: #FFFFFF;
    min-height: 100vh;
  }

  .fio-topo {
    height: 4px;
    width: 100%;
    background: linear-gradient(90deg, #7A2E1A 0%, #C1440E 45%, #F4941E 100%);
  }

  .logo-faixa {
    display: flex;
    justify-content: center;
    padding: 22px 0 18px;
    background: #FFFFFF;
  }
  .logo-card {
    background: #003D7C;
    color: #fff;
    font-weight: 800;
    font-style: italic;
    font-size: 26px;
    width: 108px;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 22px;
    letter-spacing: 0.2px;
  }

  .barra-progresso-wrap {
    padding: 16px 26px;
    background: #FFFFFF;
    border-bottom: 1px solid #F3E9DC;
  }
  .barra-progresso-trilho {
    width: 100%;
    height: 5px;
    border-radius: 999px;
    background: #F0DCC8;
    overflow: hidden;
  }
  .barra-progresso-preenchida {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #F4941E 0%, #C1440E 100%);
    transition: width 320ms ease;
  }

  .banner-laranja {
    background: linear-gradient(160deg, #F4941E 0%, #C1440E 100%);
    padding: 34px 26px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .banner-icone {
    width: 30px; height: 30px;
    border: 2px solid #fff;
    border-radius: 6px;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 15px;
    font-family: Georgia, serif;
  }
  .banner-titulo {
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 25px;
    font-weight: 800;
    line-height: 1.3;
    margin: 0;
    max-width: 420px;
  }

  .corpo-carta {
    padding: 26px 26px 8px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .saudacao {
    color: #C1440E;
    font-weight: 700;
    font-size: 15px;
    margin: 0;
  }

  .paragrafo {
    font-size: 14.5px;
    line-height: 1.6;
    color: #2B2B2B;
    margin: 0;
  }

  .pergunta-titulo {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.45;
    color: #1A1A1A;
    margin: 4px 0 4px;
  }

  .notas-grade {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    gap: 4px;
    margin: 6px 0 6px;
    width: 100%;
  }
  .nota-btn {
    flex: 1 1 0;
    min-width: 0;
    height: 40px;
    border-radius: 6px;
    border: none;
    background: #F0DCC8;
    color: #7A5E42;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 120ms ease, filter 120ms ease;
    padding: 0;
  }
  .nota-num { font-size: 12.5px; font-weight: 800; }
  .nota-btn:hover { transform: translateY(-1px); }
  .nota-ativa.nota-baixa { background: #B23A1A; color: #fff; }
  .nota-ativa.nota-media { background: #F4941E; color: #3A2410; }
  .nota-ativa.nota-alta { background: #1F7A5C; color: #fff; }

  .opcoes-lista { display: flex; flex-direction: column; gap: 8px; margin: 6px 0; }
  .opcao-item {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1.5px solid #E7DACB;
    background: #FFFFFF;
    font-size: 14.5px;
    color: #2B2B2B;
    cursor: pointer;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .opcao-item:hover { border-color: #F4941E; }
  .opcao-ativa { border-color: #C1440E; background: #FFF3E8; }
  .opcao-letra {
    flex: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #F0DCC8;
    color: #7A5E42;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .opcao-ativa .opcao-letra { background: #C1440E; color: #fff; }

  .opcao-check {
    flex: none;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid #D8C6AE;
    background: #FFFFFF;
    color: #fff;
    font-size: 13px;
    font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .opcao-ativa .opcao-check {
    background: #C1440E;
    border-color: #C1440E;
  }

  .pergunta-opcional {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #A08A70;
    margin: -6px 0 0;
  }

  .campo-texto {
    width: 100%;
    resize: vertical;
    border-radius: 10px;
    border: 1.5px solid #E7DACB;
    padding: 12px 14px;
    font-size: 14.5px;
    font-family: inherit;
    color: #2B2B2B;
    outline: none;
    margin-top: 4px;
  }
  .campo-texto:focus { border-color: #C1440E; }
  .contador { align-self: flex-end; font-size: 11.5px; color: #A08A70; margin-top: -10px; }
  .mensagem-erro { font-size: 13px; color: #B23A1A; margin: 0; }

  .botao-primario {
    background: #C1440E;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: background 200ms ease, filter 120ms ease, transform 100ms ease;
  }
  .botao-primario:hover:not(:disabled) { filter: brightness(1.05); }
  .botao-primario:disabled { background: #C7C2BB; color: #fff; cursor: not-allowed; }
  .botao-concluir:disabled { background: #C7C2BB; }
  .botao-concluir:active:not(:disabled) { transform: scale(0.98); }

  .botao-secundario {
    background: transparent;
    color: #2B2B2B;
    border: 1.5px solid #E7DACB;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .nav-duas-colunas { display: flex; gap: 10px; margin-top: 4px; }
  .nav-duas-colunas .botao-primario,
  .nav-duas-colunas .botao-secundario { flex: 1; margin-top: 0; }

  .resumo-final {
    border-radius: 10px;
    border: 1px solid #E7DACB;
    background: #FFF8EF;
    padding: 4px 14px;
    margin: 4px 0;
  }
  .resumo-linha {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #F0DFC9; font-size: 14px;
  }
  .resumo-linha:last-child { border-bottom: none; }
  .resumo-linha span { color: #8A6E52; }
  .resumo-linha strong { color: #1A1A1A; }

  .rodape {
    border-top: 1px solid #EDEDED;
    margin-top: 22px;
    padding: 20px 0 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .rodape-assinatura {
    font-size: 13.5px;
    color: #2B2B2B;
    line-height: 1.6;
    margin: 0;
  }
  .rodape-icones { display: flex; gap: 10px; }
  .icone-social {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #C1440E;
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }
  .rodape-ajuda { font-size: 12px; color: #8A8A8A; margin: 0; }

  @media (prefers-reduced-motion: reduce) {
    .loading-dot { animation: none !important; }
  }
`;
